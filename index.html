<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      color: #444;
    }

    .divider {
      margin: 18px auto;
      font-size: 18px;
      color: #d4c08a;
      letter-spacing: 6px;
      opacity: 0.8;
    }

    .hero-container { position: relative; }

    img.hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      filter: brightness(0.75);
    }

    .hero-text {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Great Vibes', cursive;
      font-size: 46px;
      color: #d4af37;
      text-shadow: 0 0 14px rgba(212,175,55,0.35);
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .section {
      padding: 28px 20px;
      color: #555;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #333;
    }

    .date-item {
      margin: 8px 0;
      font-size: 15px;
      color: #666;
      letter-spacing: 0.3px;
    }

    /* ICONLAR DAHA İNCƏ */
    .date-item i {
      color: #cbb27a;
      margin-right: 6px;
      font-size: 13px;
      opacity: 0.7;
    }

    .countdown {
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:25px;
      font-family:'Playfair Display', serif;
    }

    .countdown div {
      font-size:28px;
      color:#c59d5f;
      min-width:75px;
    }

    small {
      font-size:13px;
      color:#888;
      display:block;
    }

    /* GOLD BUTTON */
    .btn-gold {
      width:85%;
      padding:15px;
      margin-top:12px;
      background: linear-gradient(135deg,#d4af37,#f3d27a);
      border:none;
      border-radius:50px;
      font-weight:500;
      letter-spacing:1px;
      color:#222;
      box-shadow:0 10px 25px rgba(212,175,55,0.3);
      cursor:pointer;
      transition:all 0.25s ease;
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow:0 14px 30px rgba(212,175,55,0.4);
    }

    .btn-gold:active {
      transform: scale(0.96);
    }

    /* YES NO BUTTONS */
    .btn-outline {
      padding:10px 20px;
      margin:8px;
      background:#fff;
      border:1px solid #eee;
      color:#444;
      border-radius:30px;
      font-size:15px;
      cursor:pointer;
      transition:all 0.25s ease;
    }

    .btn-outline:hover {
      border-color:#c59d5f;
      color:#c59d5f;
    }

    .btn-outline.active {
      background:#222;
      color:#fff;
      border-color:#222;
      box-shadow:0 6px 15px rgba(0,0,0,0.15);
    }

    /* INPUT */
    input {
      padding:14px 16px;
      width:80%;
      border-radius:30px;
      border:1px solid #eee;
      margin-top:12px;
      font-size:15px;
      outline:none;
      transition:all 0.25s ease;
      background:#fafafa;
      color:#444;
    }

    input::placeholder {
      color:#aaa;
      font-style:italic;
    }

    input:focus {
      border-color:#c59d5f;
      background:#fff;
      box-shadow:0 0 0 3px rgba(197,157,95,0.12);
    }

    /* MODAL */
    .modal {
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.5);
      align-items:center;
      justify-content:center;
    }

    .modal-content {
      background:#fff;
      padding:25px;
      border-radius:20px;
      width:80%;
      max-width:300px;
      text-align:center;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform:scale(0.7); opacity:0; }
      to { transform:scale(1); opacity:1; }
    }

    .modal-content h3 {
      color:#c59d5f;
      margin-bottom:10px;
    }
    h2 {
  font-family: 'Playfair Display', serif;
  font-weight: 500;
  color: #c59d5f;
}
  </style>
</head>

<body>

<div class="hero-container">
  <img class="hero" src="https://media.istockphoto.com/id/940217166/photo/exchange-of-wedding-rings-white.jpg?s=612x612&w=0&k=20&c=90KBKD25Ab6NevFoA3bW4hqrX3FLM4dAl5FU6NLBTPo=" />
  <div class="hero-text">Müşviq ✨ Günay</div>
</div>

<div class="divider">❦ ❦ ❦</div>

<div class="section">
  Sizi həyatımızın ən xoş gününü birlikdə qeyd etməyə dəvət edirik
</div>

<div class="divider">✦ ✦ ✦</div>

<div class="section">
  <div class="date-item"><i class="fa-solid fa-calendar-days"></i>29 May 2026</div>
  <div class="date-item"><i class="fa-solid fa-clock"></i>18:00</div>
  <div class="date-item"><i class="fa-solid fa-location-dot"></i>Zirvə Şadlıq Sarayı</div>
</div>

<div class="divider">❦ ❦ ❦</div>

<div class="section">
  <h2>Geri Sayım</h2>
  <div class="countdown">
    <div><span id="days">0</span><small>gün</small></div>
    <div><span id="hours">0</span><small>saat</small></div>
    <div><span id="minutes">0</span><small>dəq</small></div>
    <div><span id="seconds">0</span><small>san</small></div>
  </div>
</div>

<div class="divider">✦ ✦ ✦</div>

<div class="section">
  <button class="btn-gold" onclick="window.open('https://www.google.com/maps/place/Zirv%C9%99+%C5%9Eadl%C4%B1q+Saray%C4%B1')">
    📍 Xəritədə bax
  </button>
</div>

<div class="divider">❦ ❦ ❦</div>

<div class="section">
  <h2>İştirak təsdiqi</h2>

  <form action="https://formspree.io/f/mqewwbrd" method="POST" onsubmit="showModal(event)">
    <input type="text" name="fullname" id="fullname" placeholder="Ad Soyad" required />

    <br/>

    <button type="button" class="btn-outline" onclick="selectStatus(this,'Gəlirəm')">Gəlirəm</button>
    <button type="button" class="btn-outline" onclick="selectStatus(this,'Gəlmirəm')">Gəlmirəm</button>

    <input type="hidden" name="status" id="status" />

    <br/>
    <button class="btn-gold" type="submit">✨ Göndər</button>
  </form>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>✨ Təşəkkürlər!</h3>
    <p>Sizin cavabınız qəbul edildi 💖</p>
  </div>
</div>

<script>
  const targetDate = new Date('2026-05-29T18:00:00').getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById('hours').innerText = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById('minutes').innerText = Math.floor((diff / (1000*60)) % 60);
    document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60);
  }, 1000);

  function selectStatus(btn, value) {
    document.getElementById('status').value = value;

    document.querySelectorAll('.btn-outline').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    btn.style.transform = 'scale(0.95)';
    setTimeout(()=>btn.style.transform='scale(1)',150);
  }

  function showModal(e){
    setTimeout(()=>{
      document.getElementById('modal').style.display='flex';
      setTimeout(()=>{
        document.getElementById('modal').style.display='none';
      },2500);
    },300);
  }
</script>

</body>
</html>
